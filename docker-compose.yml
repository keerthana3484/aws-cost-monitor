version: '3.8'

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: aws-cost-monitor-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    volumes:
      # Optional: mount local volume if persistent database is needed in future
      - dynamodb-data:/home/dynamodblocal/data
    restart: always

volumes:
  dynamodb-data:
